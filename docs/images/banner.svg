<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Hedera-Native RWA — Part 2">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1419"/>
      <stop offset="1" stop-color="#11212e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="none" stroke="#2b3543" stroke-width="2"/>

  <!-- left accent rule -->
  <rect x="64" y="78" width="6" height="164" rx="3" fill="url(#accent)"/>

  <!-- part chip -->
  <g transform="translate(96, 70)">
    <rect x="0" y="0" width="262" height="30" rx="15" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="20" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="2" fill="#60a5fa">PART 2 · NATIVE SERVICES</text>
  </g>

  <!-- title -->
  <text x="96" y="164" font-family="Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#e6edf3">Hedera-Native RWA</text>

  <!-- subtitle -->
  <text x="98" y="210" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#9aa7b4">Compliance-gated Real World Assets, the native way:</text>
  <text x="98" y="244" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#9aa7b4">
    <tspan fill="#e6edf3" font-weight="600">HTS keys</tspan> · <tspan fill="#e6edf3" font-weight="600">HCS audit trail</tspan> · <tspan fill="#e6edf3" font-weight="600">Mirror Node</tspan> · <tspan fill="#e6edf3" font-weight="600">@hashgraph/sdk</tspan>
  </text>

  <!-- compliance status motif (echoes the dApp badges) -->
  <g transform="translate(96, 276)" font-family="Helvetica, Arial, sans-serif" font-size="14">
    <circle cx="7" cy="-4" r="6" fill="#2ea043"/>
    <text x="22" y="0" fill="#9aa7b4">KYC granted</text>
    <circle cx="147" cy="-4" r="6" fill="#d29922"/>
    <text x="162" y="0" fill="#9aa7b4">freeze</text>
    <circle cx="247" cy="-4" r="6" fill="#f85149"/>
    <text x="262" y="0" fill="#9aa7b4">paused</text>
    <text x="350" y="0" fill="#5b6b7b">— enforced at consensus, not in a contract</text>
  </g>

  <!-- right-side hexagon motif (Hedera nod) -->
  <g transform="translate(980, 160)" opacity="0.9">
    <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="none" stroke="#243041" stroke-width="2"/>
    <polygon points="0,-56 48,-28 48,28 0,56 -48,28 -48,-28" fill="none" stroke="#2b3543" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#3b82f6"/>
    <circle cx="0" cy="-56" r="5" fill="#2ea043"/>
    <circle cx="48" cy="28" r="5" fill="#60a5fa"/>
    <circle cx="-48" cy="28" r="5" fill="#60a5fa"/>
    <line x1="0" y1="0" x2="0" y2="-56" stroke="#243041" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="48" y2="28" stroke="#243041" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-48" y2="28" stroke="#243041" stroke-width="1.5"/>
  </g>
</svg>
